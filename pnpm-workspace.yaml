packages:
  # all packages in subdirs of packages/ and components/
  - 'packages/*'
  - 'apps/*'
  - 'libs/*'
  # exclude packages that are inside test directories
  - '!**/test/**'
  # all packages in enterprise modules
  - 'enterprise/packages/*'
  - 'enterprise/workers/step-resolver'
  # playground apps
  - 'playground/*'

# Pnpm configuration
# Wait 3 days (4320 minutes) before allowing packages to be installed
minimumReleaseAge: 4320
# Workaround for pnpm v11.0.4+: the new `minimumReleaseAgeStrict: true` default
# raises spurious ERR_PNPM_MISSING_TIME errors during resolution
# (see https://github.com/pnpm/pnpm/issues/11238). Falling back to non-strict
# matches the pre-v11.0.4 behavior.
minimumReleaseAgeStrict: false

# Settings migrated from .npmrc (pnpm v11 reads only auth/registry settings from .npmrc).
autoInstallPeers: true
strictPeerDependencies: false
fetchRetryMaxtimeout: 10000
enablePrePostScripts: true

