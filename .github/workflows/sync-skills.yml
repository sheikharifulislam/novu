name: Sync agent skills to docs

# Keeps the standalone `novuhq/skills` repository in sync with the Mintlify docs
# site. The skills are vendored into `docs/.mintlify/skills/` so Mintlify serves
# them at `/skill.md` and `/.well-known/skills/*` (Mintlify does not init git
# submodules at build time, so the files must be committed).
#
# Triggers:
#   - schedule:           daily safety-net sync
#   - workflow_dispatch:  manual run (optionally override source ref / PR base)
#   - repository_dispatch: instant sync fired by novuhq/skills on push to main
#                          (event type: skills-updated, optional client_payload.ref)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "novuhq/skills branch/tag/sha to sync from"
        required: false
        default: "main"
      base:
        description: "Base branch to open the sync PR against"
        required: false
        default: "next"
  repository_dispatch:
    types: [skills-updated]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  sync:
    name: Sync skills and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve source ref and PR base
        id: resolve
        env:
          DISPATCH_REF: ${{ github.event.client_payload.ref }}
          INPUT_REF: ${{ github.event.inputs.ref }}
          INPUT_BASE: ${{ github.event.inputs.base }}
        run: |
          ref="${DISPATCH_REF:-${INPUT_REF:-main}}"
          base="${INPUT_BASE:-next}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "Syncing from novuhq/skills@$ref into PR base '$base'"

      - name: Sync skills into docs/.mintlify/skills
        env:
          SKILLS_REF: ${{ steps.resolve.outputs.ref }}
        run: |
          chmod +x scripts/sync-skills.sh
          scripts/sync-skills.sh

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5
        with:
          token: ${{ secrets.SKILLS_SYNC_TOKEN || secrets.GITHUB_TOKEN }}
          base: ${{ steps.resolve.outputs.base }}
          branch: chore/sync-agent-skills
          delete-branch: true
          commit-message: "docs(skills): sync agent skills from novuhq/skills@${{ steps.resolve.outputs.ref }}"
          title: "docs(skills): sync agent skills from novuhq/skills"
          labels: documentation
          body: |
            Automated sync of the [`novuhq/skills`](https://github.com/novuhq/skills)
            agent skills into `docs/.mintlify/skills/` (source ref:
            `${{ steps.resolve.outputs.ref }}`).

            Mintlify serves these at `/skill.md` and `/.well-known/skills/*`.

            Skills whose `SKILL.md` is missing the required YAML frontmatter
            (`name` + `description`) are skipped — see the job summary for details.
            Fix those in the `novuhq/skills` repository.

            > Generated by `.github/workflows/sync-skills.yml`. Do not edit
            > `docs/.mintlify/skills/` by hand; changes are overwritten on the next sync.
