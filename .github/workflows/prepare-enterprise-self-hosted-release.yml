name: Prepare Enterprise Self-hosted Release
run-name: >
  Building enterprise v${{ github.event.inputs.version }}:
  ${{
    github.event.inputs.build_api == 'true' && 'api, ' || ''
  }}${{
    github.event.inputs.build_worker == 'true' && 'worker, ' || ''
  }}${{
    github.event.inputs.build_dashboard == 'true' && 'dashboard, ' || ''
  }}${{
    github.event.inputs.build_ws == 'true' && 'ws, ' || ''
  }}${{
    github.event.inputs.build_inbound_mail == 'true' && 'inbound-mail ' || ''
  }}

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.0)"
        required: true
        type: string
      build_api:
        description: "Build API service"
        required: true
        type: boolean
        default: true
      build_worker:
        description: "Build Worker service"
        required: true
        type: boolean
        default: true
      build_dashboard:
        description: "Build Dashboard service"
        required: true
        type: boolean
        default: true
      build_ws:
        description: "Build WebSocket service"
        required: true
        type: boolean
        default: true
      build_inbound_mail:
        description: "Build Inbound Mail service"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  packages: write
  deployments: write
  id-token: write

jobs:
  setup_matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Validate Selected Services
        env:
          INPUT_BUILD_API: ${{ github.event.inputs.build_api }}
          INPUT_BUILD_WORKER: ${{ github.event.inputs.build_worker }}
          INPUT_BUILD_DASHBOARD: ${{ github.event.inputs.build_dashboard }}
          INPUT_BUILD_WS: ${{ github.event.inputs.build_ws }}
          INPUT_BUILD_INBOUND_MAIL: ${{ github.event.inputs.build_inbound_mail }}
        run: |
          if [ "$INPUT_BUILD_API" != "true" ] && \
             [ "$INPUT_BUILD_WORKER" != "true" ] && \
             [ "$INPUT_BUILD_DASHBOARD" != "true" ] && \
             [ "$INPUT_BUILD_WS" != "true" ] && \
             [ "$INPUT_BUILD_INBOUND_MAIL" != "true" ]; then
            echo "Error: At least one service must be selected for building."
            exit 1
          fi

      - name: Generate Build Matrix
        id: set-matrix
        env:
          INPUT_BUILD_API: ${{ github.event.inputs.build_api }}
          INPUT_BUILD_WORKER: ${{ github.event.inputs.build_worker }}
          INPUT_BUILD_DASHBOARD: ${{ github.event.inputs.build_dashboard }}
          INPUT_BUILD_WS: ${{ github.event.inputs.build_ws }}
          INPUT_BUILD_INBOUND_MAIL: ${{ github.event.inputs.build_inbound_mail }}
        run: |
          services=()

          if [ "$INPUT_BUILD_API" == "true" ]; then
            services+=("\"api-ee\"")
          fi
          if [ "$INPUT_BUILD_WORKER" == "true" ]; then
            services+=("\"worker-ee\"")
          fi
          if [ "$INPUT_BUILD_DASHBOARD" == "true" ]; then
            services+=("\"dashboard-ee-clerk\"")
            services+=("\"dashboard-ee-betterauth\"")
          fi
          if [ "$INPUT_BUILD_WS" == "true" ]; then
            services+=("\"ws-ee\"")
          fi
          if [ "$INPUT_BUILD_INBOUND_MAIL" == "true" ]; then
            services+=("\"inbound-mail-ee\"")
          fi

          matrix="[$(IFS=','; echo "${services[*]}")]"

          echo "matrix=$matrix" >> $GITHUB_OUTPUT
          echo "Building services: $matrix"

  build_docker:
    needs: setup_matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: Production
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJson(needs.setup_matrix.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          submodules: true
          fetch-depth: 0
          token: ${{ secrets.SUBMODULES_TOKEN }}

      - name: Variables
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "Error: version must be semver (e.g. 1.2.3 or 1.2.3-rc.1), got: $INPUT_VERSION"
            exit 1
          fi
          SERVICE_NAME="${{ matrix.name }}"
          LATEST_VERSION="$INPUT_VERSION"

          # Extract auth provider if present
          if [[ "$SERVICE_NAME" == *"-clerk" ]]; then
            AUTH_PROVIDER="clerk"
            SERVICE_COMMON_NAME="dashboard"
            REPO_NAME="dashboard-ee"
            IMAGE_TAG="${LATEST_VERSION}-clerk"
          elif [[ "$SERVICE_NAME" == *"-betterauth" ]]; then
            AUTH_PROVIDER="better-auth"
            SERVICE_COMMON_NAME="dashboard"
            REPO_NAME="dashboard-ee"
            IMAGE_TAG="${LATEST_VERSION}-betterauth"
          else
            AUTH_PROVIDER=""
            SERVICE_COMMON_NAME=$(echo "$SERVICE_NAME" | sed 's/-ee$//')
            REPO_NAME="$SERVICE_NAME"
            IMAGE_TAG="$LATEST_VERSION"
          fi

          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV
          echo "SERVICE_COMMON_NAME=$SERVICE_COMMON_NAME" >> $GITHUB_ENV
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "AUTH_PROVIDER=$AUTH_PROVIDER" >> $GITHUB_ENV
          echo "This is the service name: $SERVICE_NAME with repo: $REPO_NAME and tag: $IMAGE_TAG"
          if [ -n "$AUTH_PROVIDER" ]; then
            echo "Auth provider: $AUTH_PROVIDER"
          fi

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11.0.9
          run_install: false

      - name: Setup Node Version
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22.22.1"
          cache: "pnpm"

      - name: Install Dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Symlink Enterprise Packages
        shell: bash
        run: pnpm symlink:submodules

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: "image=moby/buildkit:v0.13.1"

      - name: Prepare Variables
        run: echo "BULL_MQ_PRO_NPM_TOKEN=${{ secrets.BULL_MQ_PRO_NPM_TOKEN }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: gha-ee-release-${{ github.run_id }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Build, tag, and push image to Amazon ECR
        shell: bash
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: novu
          DOCKER_BUILD_ARGUMENTS: >
            --platform=linux/amd64
            --output=type=image,name=$REGISTRY/$REPOSITORY/$REPO_NAME,push-by-digest=true,name-canonical=true
        run: |
          cp scripts/dotenvcreate.mjs apps/$SERVICE_COMMON_NAME/src/dotenvcreate.mjs
          cd apps/$SERVICE_COMMON_NAME

          if [[ "$SERVICE_COMMON_NAME" =~ ^(api|worker|ws)$ ]]; then
            cd src/ && echo -e "\nIS_SELF_HOSTED=true\nNOVU_ENTERPRISE=true" >> .example.env && cd ..
          fi

          # Switch from PM2 cluster mode to single node process to support K8s deployments
          if [[ "$SERVICE_COMMON_NAME" =~ ^(api|worker|ws)$ ]]; then
            echo "Switching $SERVICE_COMMON_NAME from PM2 cluster mode to single node process to support K8s deployments"
            sed -i.bak 's/pm2-runtime start dist\/main\.js -i max/node dist\/main.js/g' Dockerfile && rm -f Dockerfile.bak
          fi

          # Build dashboard with auth provider build args
          if [[ "$SERVICE_COMMON_NAME" == "dashboard" ]]; then
            if [[ "$AUTH_PROVIDER" == "clerk" ]]; then
              echo "Building dashboard for Clerk authentication"
              docker buildx build \
                --load \
                --platform=linux/amd64 \
                --build-arg VITE_EE_AUTH_PROVIDER=clerk \
                --build-arg VITE_SELF_HOSTED=true \
                --build-arg VITE_NOVU_ENTERPRISE=true \
                -t novu-$SERVICE_COMMON_NAME \
                -f dockerfile \
                ../..
            elif [[ "$AUTH_PROVIDER" == "better-auth" ]]; then
              echo "Building dashboard for Better Auth authentication"
              docker buildx build \
                --load \
                --platform=linux/amd64 \
                --build-arg VITE_EE_AUTH_PROVIDER=better-auth \
                --build-arg VITE_SELF_HOSTED=true \
                --build-arg VITE_NOVU_ENTERPRISE=true \
                -t novu-$SERVICE_COMMON_NAME \
                -f dockerfile \
                ../..
            fi
          else
            pnpm run docker:build
          fi

          docker tag novu-$SERVICE_COMMON_NAME $REGISTRY/$REPOSITORY/$REPO_NAME:$IMAGE_TAG
          docker push $REGISTRY/$REPOSITORY/$REPO_NAME:$IMAGE_TAG

      - name: Output image details
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          echo "Successfully built and pushed:"
          echo "  - $REGISTRY/novu/$REPO_NAME:$IMAGE_TAG"
          echo "Platform: linux/amd64 (x86)"
          echo "Type: Enterprise Self-hosted"

  linear_release_complete:
    name: Complete Linear Release (Enterprise)
    needs: build_docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Normalize Linear release version
        env:
          RAW_VERSION: ${{ github.event.inputs.version }}
        run: |
          ver="${RAW_VERSION#v}"
          echo "LINEAR_RELEASE_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Sync release to Linear
        uses: linear/linear-release-action@0353b5fa8c00326913966f00557d68f8f30b8b6b # pinned v0 ref
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_ENTERPRISE }}
          name: v${{ env.LINEAR_RELEASE_VERSION }}
          version: ${{ env.LINEAR_RELEASE_VERSION }}

      - name: Complete release in Linear
        uses: linear/linear-release-action@0353b5fa8c00326913966f00557d68f8f30b8b6b # pinned v0 ref
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_ENTERPRISE }}
          command: complete
          version: ${{ env.LINEAR_RELEASE_VERSION }}
