[build]
  command = "pnpm run build:dashboard --skip-nx-cache"

[build.environment]
  NODE_OPTIONS="--max_old_space_size=4096"

[context.deploy-preview]
  command = "pnpm run build:dashboard --skip-nx-cache"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF apps/dashboard"

[[redirects]]
  from = "/legacy/*"
  to = "/legacy/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Clerk satellite handshakes redirect through /auth/* — prevent Netlify CDN from caching
# stale 200/index.html responses during cross-domain session sync (known Clerk + Netlify issue).
[[headers]]
  for = "/auth/*"
  [headers.values]
    Cache-Control = "private, no-cache, no-store, must-revalidate"
    Netlify-CDN-Cache-Control = "private, no-cache, no-store, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Netlify-CDN-Cache-Control = "private, no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    Document-Policy = "js-profiling"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "frame-ancestors 'none';"
    Permissions-Policy = "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()"
    Strict-Transport-Security = '''
    max-age=63072000;
    includeSubDomains;
    preload'''
